spring.application.name=backend

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/school_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=root123

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Liquibase Settings
spring.liquibase.change-log=classpath:db/changelog/master.xml
spring.liquibase.enabled=true
spring.liquibase.drop-first=false
logging.level.liquibase=DEBUG

# JWT Settings
jwt.secret=YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast256BitsLong
jwt.expiration=86400000

# Groq AI API Key (FREE!)
# Get your key from https://console.groq.com
groq.api.key=${GROQ_API_KEY:}

# Server (use 8080, or set PORT environment variable)
server.port=${PORT:8080}
