version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    container_name: school_db
    environment:
      POSTGRES_DB: school_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: